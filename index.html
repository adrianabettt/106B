<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica do Lanche - Profª Adriana</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background-color: #fff3e0; margin: 0; padding: 5px; overflow: hidden; }
        h1 { font-size: 18px; color: #e65100; margin: 2px; }
        .instrucao { font-size: 12px; color: #bf360c; font-weight: bold; margin-bottom: 5px; }

        .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .inventory { display: flex; gap: 5px; }
        .arrow { 
            width: 42px; height: 42px; background: white; border: 2px solid #ff9800; 
            border-radius: 8px; font-size: 22px; cursor: grab; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 3px #ef6c00;
        }

        .program-container { 
            display: grid; grid-template-columns: repeat(6, 42px); gap: 4px; 
            padding: 8px; background: #ffe0b2; border-radius: 10px;
        }
        .slot { 
            width: 42px; height: 42px; border: 2px dashed #ff9800; 
            border-radius: 6px; background: #fff; display: flex; 
            align-items: center; justify-content: center; font-size: 20px;
        }

        #grid { 
            display: grid; grid-template-columns: repeat(5, 42px); grid-template-rows: repeat(5, 42px);
            width: 210px; height: 210px; background: white; border: 3px solid #ff9800; 
            position: relative; margin: 5px auto;
        }
        .quadradinho { border: 1px solid #f5f5f5; box-sizing: border-box; }

        .item { position: absolute; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        #chef { transition: 0.4s; z-index: 10; top: 0; left: 0; }
        #pao { top: 42px; left: 84px; }
        #queijo { top: 126px; left: 126px; }
        #alface { top: 168px; left: 42px; }

        .btn-executar { 
            padding: 8px 25px; background: #e65100; color: white; 
            font-weight: bold; border-radius: 20px; border: none; cursor: pointer; font-size: 14px;
        }

        footer { margin-top: 5px; font-size: 10px; color: #bf360c; font-weight: bold; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                 background: white; padding: 20px; border: 6px solid #e65100; border-radius: 15px; z-index: 20; width: 280px;}
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 15; }
        
        .btn-modal { padding: 10px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-reset { background: #d32f2f; color: white; }
        .btn-cont { background: #2e7d32; color: white; }
    </style>
</head>
<body>

    <h1>🥪 Lógica do Lanche</h1>
    <p class="instrucao">1º Pão 🍞 ➔ 2º Queijo 🧀 ➔ 3º Alface 🥬</p>

    <div class="game-wrapper">
        <div class="inventory">
            <div class="arrow" draggable="true" ondragstart="drag(event)" id="up">⬆️</div>
            <div class="arrow" draggable="true" ondragstart="drag(event)" id="down">⬇️</div>
            <div class="arrow" draggable="true" ondragstart="drag(event)" id="left">⬅️</div>
            <div class="arrow" draggable="true" ondragstart="drag(event)" id="right">➡️</div>
        </div>

        <div class="program-container">
            <script>for(let i=0; i<12; i++) document.write('<div class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>');</script>
        </div>

        <button class="btn-executar" id="btnRun" onclick="iniciarRota()">EXECUTAR ▶️</button>

        <div id="grid">
            <script>for(let i=0;i<25;i++) document.write('<div class="quadradinho"></div>');</script>
            <div class="item" id="pao">🍞</div>
            <div class="item" id="queijo">🧀</div>
            <div class="item" id="alface">🥬</div>
            <div class="item" id="chef">👨‍🍳</div>
        </div>
    </div>

    <footer>
        Profª Adriana Bett Terebinto | São Lourenço do Oeste - SC
    </footer>

    <div id="overlay"></div>
    <div id="modal">
        <h1 id="emoji"></h1>
        <h2 id="msg" style="font-size: 16px;"></h2>
        <div id="nota" style="font-size: 35px; font-weight: bold; margin: 10px 0; color: #e65100;"></div>
        <button class="btn-modal btn-reset" onclick="location.reload()">RECOMEÇAR TUDO</button>
        <button class="btn-modal btn-cont" onclick="fecharModal()">CONTINUAR</button>
    </div>

    <script>
        let px = 0, py = 0, checklist = [];
        const tam = 42;

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const node = document.getElementById(data).cloneNode(true);
            node.id = "c"+Math.random();
            if (ev.target.classList.contains('slot') && ev.target.children.length === 0) {
                ev.target.appendChild(node);
            }
        }

        async function iniciarRota() {
            document.getElementById('btnRun').disabled = true;
            const slots = document.querySelectorAll('.slot');
            for (let s of slots) {
                if (s.children.length > 0 && !s.dataset.executado) {
                    const move = s.firstChild.innerText;
                    s.style.backgroundColor = "#ffd54f";
                    await mover(move);
                    verificarColeta();
                    s.style.backgroundColor = "#e0e0e0"; 
                    s.dataset.executado = "true"; // Marca para não repetir se continuar
                }
            }
            finalizar();
        }

        function mover(dir) {
            return new Promise(r => {
                if(dir==="⬆️" && py>0) py-=tam;
                if(dir==="⬇️" && py<(tam*4)) py+=tam;
                if(dir==="⬅️" && px>0) px-=tam;
                if(dir==="➡️" && px<(tam*4)) px+=tam;
                const c = document.getElementById('chef');
                c.style.left = px+"px"; c.style.top = py+"px";
                setTimeout(r, 450);
            });
        }

        function verificarColeta() {
            if(px===(tam*2) && py===tam && !checklist.includes('🍞')) checklist.push('🍞');
            if(px===(tam*3) && py===(tam*3) && checklist.includes('🍞') && !checklist.includes('🧀')) checklist.push('🧀');
            if(px===tam && py===(tam*4) && checklist.includes('🧀') && !checklist.includes('🥬')) checklist.push('🥬');
        }

        function finalizar() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            
            let pontos = 0;
            if (checklist.length === 1) pontos = 3;
            else if (checklist.length === 2) pontos = 6;
            else if (checklist.length === 3) pontos = 10;

            document.getElementById('nota').innerText = "NOTA: " + pontos;

            if(pontos === 10) {
                document.getElementById('emoji').innerText = "🏆";
                document.getElementById('msg').innerText = "PERFEITO! VOCÊ É UM CHEF!";
            } else if (pontos > 0) {
                document.getElementById('emoji').innerText = "🥪";
                document.getElementById('msg').innerText = "VOCÊ PEGOU ALGUNS ITENS!";
            } else {
                document.getElementById('emoji').innerText = "🤔";
                document.getElementById('msg').innerText = "NÃO PEGOU NADA AINDA...";
            }
        }

        function fecharModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            document.getElementById('btnRun').disabled = false;
        }
    </script>
</body>
</html>
