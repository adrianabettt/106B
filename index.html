<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica do Lanche - Profª Adriana</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', sans-serif; 
            background-color: #fff3e0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Título e Instruções */
        .header-container { text-align: left; width: 100%; max-width: 800px; margin-bottom: 15px; }
        h1 { font-size: 24px; color: #e65100; margin: 0; display: flex; align-items: center; gap: 10px; }
        .instrucao { font-size: 16px; color: #bf360c; font-weight: bold; margin: 10px 0; }

        /* Layout Principal: Esquerda (Controles) | Direita (Grid) */
        .main-layout { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start; 
            gap: 40px; 
            background: #fff9f0; 
            padding: 20px; 
            border-radius: 15px; 
        }

        /* Lado Esquerdo - Comandos */
        .controls-side { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        .inventory { display: flex; gap: 10px; }
        .arrow { 
            width: 50px; height: 50px; background: white; border: 3px solid #ff9800; 
            border-radius: 12px; font-size: 28px; cursor: grab; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 4px #ef6c00;
        }

        .program-container { 
            display: grid; grid-template-columns: repeat(6, 55px); gap: 8px; 
            padding: 15px; background: #ffe0b2; border-radius: 20px;
        }
        .slot { 
            width: 55px; height: 55px; border: 3px dashed #ff9800; 
            border-radius: 12px; background: #fff; display: flex; 
            align-items: center; justify-content: center; font-size: 24px;
        }

        /* Botões */
        .buttons-container { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .btn { 
            padding: 12px 30px; font-size: 18px; font-weight: bold; 
            border-radius: 30px; border: none; cursor: pointer; color: white;
            transition: 0.2s;
        }
        .btn-limpar { background: #ffeb3b; color: #333; box-shadow: 0 4px #fbc02d; }
        .btn-executar { background: #e65100; box-shadow: 0 4px #bf360c; display: flex; align-items: center; gap: 8px; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* Lado Direito - Tabuleiro */
        #grid { 
            display: grid; grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px);
            width: 250px; height: 250px; background: white; border: 5px solid #ff9800; 
            position: relative;
        }
        .quadradinho { border: 1px solid #eeeeee; box-sizing: border-box; }

        .item { position: absolute; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 32px; transition: 0.4s; }
        #chef { z-index: 10; top: 0; left: 0; }
        #pao { top: 50px; left: 100px; }
        #queijo { top: 150px; left: 150px; }
        #alface { top: 200px; left: 50px; }

        .seta-no-grid {
            position: absolute; width: 50px; height: 50px; display: flex;
            align-items: center; justify-content: center; font-size: 24px;
            opacity: 0.3; z-index: 5; color: #ff9800;
        }

        /* Modal */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                 background: white; padding: 20px; border: 6px solid #e65100; border-radius: 15px; z-index: 20; width: 280px; text-align: center;}
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 15; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🥪 Organize o caminho para que o cozinheiro junte todos os ingredientes na sequência correta.</h1>
        <p class="instrucao">1º PÃO 🍞, 2º QUEIJO 🧀, 3º ALFACE 🥬</p>
    </div>

    <div class="main-layout">
        <!-- Lado Esquerdo -->
        <div class="controls-side">
            <div class="inventory">
                <div class="arrow" draggable="true" ondragstart="drag(event)" id="up">⬆️</div>
                <div class="arrow" draggable="true" ondragstart="drag(event)" id="down">⬇️</div>
                <div class="arrow" draggable="true" ondragstart="drag(event)" id="left">⬅️</div>
                <div class="arrow" draggable="true" ondragstart="drag(event)" id="right">➡️</div>
            </div>

            <div class="program-container" id="programContainer">
                <script>for(let i=0; i<12; i++) document.write('<div class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>');</script>
            </div>

            <div class="buttons-container">
                <button class="btn btn-limpar" onclick="limparComandos()">LIMPAR</button>
                <button class="btn btn-executar" id="btnRun" onclick="iniciarRota()">EXECUTAR ▶️</button>
            </div>
        </div>

        <!-- Lado Direito -->
        <div id="grid">
            <script>for(let i=0;i<25;i++) document.write('<div class="quadradinho"></div>');</script>
            <div class="item" id="pao">🍞</div>
            <div class="item" id="queijo">🧀</div>
            <div class="item" id="alface">🥬</div>
            <div class="item" id="chef">👨‍🍳</div>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h1 id="emoji"></h1>
        <h2 id="msg"></h2>
        <div id="nota" style="font-size: 30px; font-weight: bold; margin: 10px 0; color: #e65100;"></div>
        <button class="btn btn-executar" style="box-shadow: none;" onclick="fecharModal()">TENTAR NOVAMENTE</button>
    </div>

    <script>
        let px = 0, py = 0, checklist = [];
        const tam = 50;

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const node = document.getElementById(data).cloneNode(true);
            node.id = "c"+Math.random();
            if (ev.target.classList.contains('slot') && ev.target.children.length === 0) {
                ev.target.appendChild(node);
            }
        }

        function marcarCaminho(x, y, seta) {
            const grid = document.getElementById('grid');
            const rastro = document.createElement('div');
            rastro.className = 'seta-no-grid';
            rastro.style.left = x + "px";
            rastro.style.top = y + "px";
            rastro.innerText = seta;
            grid.appendChild(rastro);
        }

        async function iniciarRota() {
            document.getElementById('btnRun').disabled = true;
            const slots = document.querySelectorAll('.slot');
            
            for (let s of slots) {
                if (s.children.length > 0 && !s.dataset.executado) {
                    const move = s.firstChild.innerText;
                    s.style.backgroundColor = "#ffd54f";
                    marcarCaminho(px, py, move);
                    await mover(move);
                    verificarColeta();
                    s.style.backgroundColor = "#e0e0e0"; 
                    s.dataset.executado = "true"; 
                }
            }
            finalizar();
        }

        function mover(dir) {
            return new Promise(r => {
                if(dir==="⬆️" && py>0) py-=tam;
                if(dir==="⬇️" && py<(tam*4)) py+=tam;
                if(dir==="⬅️" && px>0) px-=tam;
                if(dir==="➡️" && px<(tam*4)) px+=tam;
                const c = document.getElementById('chef');
                c.style.left = px+"px"; c.style.top = py+"px";
                setTimeout(r, 450);
            });
        }

        function verificarColeta() {
            if(px===(tam*2) && py===tam && !checklist.includes('🍞')) {
                checklist.push('🍞');
                document.getElementById('pao').style.opacity = "0.2";
            }
            if(px===(tam*3) && py===(tam*3) && checklist.includes('🍞') && !checklist.includes('🧀')) {
                checklist.push('🧀');
                document.getElementById('queijo').style.opacity = "0.2";
            }
            if(px===tam && py===(tam*4) && checklist.includes('🧀') && !checklist.includes('🥬')) {
                checklist.push('🥬');
                document.getElementById('alface').style.opacity = "0.2";
            }
        }

        function limparComandos() {
            // Limpa os slots
            const slots = document.querySelectorAll('.slot');
            slots.forEach(s => {
                s.innerHTML = '';
                s.style.backgroundColor = '#fff';
                delete s.dataset.executado;
            });
            // Reseta o Chef e itens
            px = 0; py = 0; checklist = [];
            const c = document.getElementById('chef');
            c.style.left = "0px"; c.style.top = "0px";
            document.getElementById('pao').style.opacity = "1";
            document.getElementById('queijo').style.opacity = "1";
            document.getElementById('alface').style.opacity = "1";
            // Remove as setas do grid
            document.querySelectorAll('.seta-no-grid').forEach(el => el.remove());
            document.getElementById('btnRun').disabled = false;
        }

        function finalizar() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            let pontos = checklist.length === 3 ? 10 : (checklist.length === 2 ? 6 : (checklist.length === 1 ? 3 : 0));
            document.getElementById('nota').innerText = "NOTA: " + pontos;
            document.getElementById('emoji').innerText = pontos === 10 ? "🏆" : (pontos > 0 ? "🥪" : "🤔");
            document.getElementById('msg').innerText = pontos === 10 ? "PERFEITO!" : "TENTE NOVAMENTE!";
        }

        function fecharModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            limparComandos();
        }
    </script>
</body>
</html>
